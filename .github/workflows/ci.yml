name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      # npm install (not ci): npm's cross-version handling of optional platform
      # deps (@emnapi/* wasm fallbacks) can make a valid lockfile read as
      # "out of sync" under npm ci. See CLAUDE.md → Known gotchas.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Lint (TypeScript)
        run: npm run lint
      - name: Test (Vitest)
        run: npx vitest run
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: E2E Tests
        run: npm run test:e2e
      - name: Build
        run: npm run build
