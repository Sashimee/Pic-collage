name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Lint (ESLint)
        run: npx eslint . --ext .ts,.tsx,.js,.jsx
      - name: Test (Vitest)
        run: npx vitest run --coverage
      - name: Build
        run: npm run build
